services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: soundserve
      POSTGRES_USER: soundserve
      POSTGRES_PASSWORD: soundserve
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soundserve -d soundserve"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file: .env.example
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"

volumes:
  postgres-data:
